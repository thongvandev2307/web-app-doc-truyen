# Build & push lên Docker Hub trên máy GitHub — không cần Docker Desktop máy bạn.
# Cần tạo Secrets trên repo: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (Access Token trên hub.docker.com)
name: Docker Hub — build and push

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/crawl-truyen:latest
